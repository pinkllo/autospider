scenario:
  id: products
  name: "基础列表+详情+翻页"
  description: "验证标准产品列表分页与详情字段提取。"

task:
  request: "采集 {base_url}/scenarios/products/ 上所有产品的 product_name、price、brand、specs 和 product_url"
  cli_overrides:
    max_pages: 5
    serial_mode: true
    headless: true
    output_dir: ".tmp/benchmark/products"

ground_truth:
  file: "ground_truth/products.jsonl"
  record_count: 15
  fields:
    - name: "product_name"
      type: "text"
      required: true
    - name: "price"
      type: "number"
      required: true
    - name: "brand"
      type: "text"
      required: true
    - name: "specs"
      type: "text"
      required: true
    - name: "product_url"
      type: "url"
      required: true

evaluation:
  match_key: "product_name"
  field_matching:
    product_name: exact
    price: numeric_tolerance
    brand: exact
    specs: contains
    product_url: exact
  thresholds:
    min_record_recall: 0.8
    min_field_f1: 0.7
    max_steps: 50
