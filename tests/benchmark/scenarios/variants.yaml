scenario:
  id: variants
  name: "布局变体采集"
  description: "验证不同 DOM 布局下的字段提取。"

task:
  request: "采集 {base_url}/scenarios/variants/index.html 中所有产品的 product_name、price、brand、specs 和 product_url"
  cli_overrides:
    max_pages: 6
    serial_mode: true
    headless: true
    output_dir: ".tmp/benchmark/variants"

ground_truth:
  file: "ground_truth/variants.jsonl"
  record_count: 10
  fields:
    - name: "product_name"
      type: "text"
      required: true
    - name: "price"
      type: "number"
      required: true
    - name: "brand"
      type: "text"
      required: true
    - name: "specs"
      type: "text"
      required: true
    - name: "product_url"
      type: "url"
      required: true
    - name: "layout_variant"
      type: "text"
      required: true

evaluation:
  match_key: "product_name"
  field_matching:
    product_name: exact
    price: numeric_tolerance
    brand: exact
    specs: exact
    product_url: exact
    layout_variant: exact
  thresholds:
    min_record_recall: 0.8
    min_field_f1: 0.7
    max_steps: 50
