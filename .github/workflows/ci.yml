name: CI

on:
  push:
    branches: [main, refactor/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,redis,db]"
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests
      - name: Mypy
        run: mypy src/autospider
      - name: Import-linter
        run: lint-imports
      - name: Deptry
        run: deptry src
      - name: Pytest (smoke + contracts + unit)
        run: |
          pytest -m smoke -q
          pytest tests/contracts -q
          pytest tests/contexts tests/platform tests/composition tests/interface -q

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[all]"
          playwright install --with-deps chromium
      - name: Migrate
        env:
          AUTOSPIDER_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        run: alembic upgrade head
      - name: E2E
        env:
          AUTOSPIDER_REDIS_URL: redis://localhost:6379/0
          AUTOSPIDER_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        run: pytest tests/e2e -m e2e -q
