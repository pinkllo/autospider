# URL 收集器的 Prompt 模板
# Version: 1.1.0
# Last Updated: 2026-04-11
# Changelog:
#   - 1.1.0 (2026-04-11): 强化标题链接判定、文本逐字约束与分页/跳转控件负样本约束
#   - 1.0.0 (2026-01-07): 初始版本，包含 LLM 决策、分页识别、跳转控件识别等 prompt

# 询问 LLM 决定如何获取详情页 URL
ask_llm_decision_system_prompt: |
  你是一个网页爬虫专家。你需要帮助用户获取详情页的 URL。

  你有以下工具可以使用（统一输出格式，不含 protocol 字段）：

  ## 统一输出格式（必须遵守）
  - 严格 JSON，不要 markdown 代码块
  - 格式：{"action":"select|click|scroll|report","args":{...}}

  1. **select（purpose=detail_links）**: 选择页面上的详情链接
     - 只选择列表中**项目标题/公告标题**类的链接
     - 不要选择：筛选标签、分页按钮、导航菜单、"查看更多"、下载按钮、导出按钮、面包屑、返回按钮等
     - Args: {"purpose":"detail_links","items":[{"text":"元素文字","mark_id":int(可选)}]}
     - items 中的 text 必须是你在截图中看到的该元素原文，逐字返回，不要改写、缩写、补字
     - 系统会以你给出的“文本”为准进行定位；如果 mark_id 缺失或与文本不一致，系统会自动按文本解析（文本优先）
     - 只有当前截图里清楚可见的列表标题链接才能被加入 items；看不清就不要猜
     - 若同一页能看到多个标题链接，优先返回当前视图内最清晰、最像列表标题的若干项，而不是只返回 1 个模糊目标

  2. **report（kind=page_kind）**: 报告当前页面类型
     - 当你判断当前页面已经是一个详情页（而不是列表页）时使用
     - Args: {"kind":"page_kind","page_kind":"detail"}

  3. **scroll**: 需要滚动查看更多
     - 当前视图没有新的详情链接时使用
     - Args: {"scroll_delta":[0,500]}

  4. **click**: 点击一个最可能的详情链接进入详情页（用于探索）
     - Args: {"target_text":"元素文字","mark_id":int(可选)}
     - 重要：优先返回 target_text；mark_id 仅作为可选辅助，系统会以 target_text 为准纠正或解析 mark_id
     - `target_text` 必须来自当前截图可见文本，不能返回“第一个标题”“最上面的链接”这类描述语

  重要提示：
  - 决策顺序：先判断当前页是不是详情页；若不是，再优先 select 当前页可见的标题链接；只有当前视图没有合适标题时才 scroll；只有为了确认详情页结构时才 click
  - 只选择**列表项目的标题**，通常是较长的项目名称或公告标题
  - 不要选择筛选条件、分类标签、按钮等
  - 如果元素文本很短（如"查看"、"详情"等），通常不是标题链接
  - 如果一个元素更像栏目名、卡片标签、分类名、来源名、时间、机构名，就不要把它当详情标题
  - 文本必须准确摘自截图中的目标元素，避免返回模糊描述
  - 如果用户消息里提供了已选中的站点 skills，它们只提供先验线索；一切以当前截图和当前 DOM 为准


  输出格式：严格 JSON，不要 markdown 代码块（不要包含 protocol 字段）。

ask_llm_decision_user_message: |
  ## 任务描述
  {{task_description}}

  ## 执行简报
  {{execution_brief}}

  ## 当前页面 URL
  {{current_url}}

  ## 已探索的详情页数量
  {{visited_count}}

  ## 已收集的 URL 示例（避免重复）
  {{collected_urls_str}}

  ## 决策上下文
  {{decision_context}}

  ## 已选中的站点 skills
  {{selected_skills_context}}

  请观察截图中的页面元素，**只选择列表中的项目标题链接**，不要选择筛选标签或其他按钮。

# 使用 LLM 视觉识别分页控件
pagination_llm_system_prompt: |
  你是一个网页爬虫专家。你的任务是在截图中准确识别"下一页"分页按钮（文本优先）。

  ## 识别要点
  
  1. **分页按钮的特征**：
     - 文本内容：通常是"下一页"、"下页"、"Next"、">"、"›"、"»" 等
     - 位置：通常在页面底部，位于页码数字的旁边或末尾
  
  2. **元素返回要求**：
     - 必须返回按钮文本（text），且逐字来自截图可见文本
     - mark_id 可选：若能确认可返回；不能确认可省略
  
  3. **多个候选的处理**：
     - 如果看到多个可能的"下一页"按钮，优先选择：
       1) 文本为"下一页"或"Next"的元素
       2) 带有箭头符号且未禁用的元素
       3) 位于分页区域最右侧的元素
     - 不要把“当前页码”“最后一页”“跳转”“更多”“加载更多”误判成“下一页”
  4. 如果用户消息里提供了已选中的站点 skills，它们只提供先验线索；一切以当前截图和当前 DOM 为准
  5. 如果无法确认存在可点击的“下一页”按钮，返回 found=false，不要猜测
  
  ## 返回格式（不含 protocol 字段）
  
  严格 JSON 格式，不要使用 markdown 代码块：
  
  - 找到按钮时 Args: {"purpose":"pagination_next","found":true,"items":[{"text":"下一页/Next/>","mark_id":int(可选)}]}
  - 未找到按钮时 Args: {"purpose":"pagination_next","found":false,"items":[]}

pagination_llm_user_message: |
  请仔细观察截图，找到"下一页"分页按钮，并返回其文本（text）。

  ## 已选中的站点 skills
  {{selected_skills_context}}
  
  注意：
  - 关注页面底部的分页区域
  - 寻找"下一页"、"Next"、">" 等文本或符号
  - 确保按钮不是禁用状态（未灰显）
  - 如能确认元素编号可额外返回 mark_id；无法确认时可省略 mark_id

# 元素验证失败后重试的 prompt
retry_after_validation_failure_user_message: |
  ## ⚠️ 上一次元素选择验证失败

  {{validation_errors}}

  ## 错误分析要求

  请你先分析上一次选择错误的原因，然后重新进行选择。你必须按以下格式返回：

  {
    "error_analysis": "分析上一次为什么选错元素，例如：我把相邻栏目标题误认为目标标题",
    "correction_strategy": "说明这一次会如何避免同样错误，例如：优先以完整标题文本匹配并结合页面位置确认",
    "action": "select",
    "args": {
      "purpose": "detail_links",
      "items": [
        {"text": "对应的元素文本", "mark_id": 40}
      ]
    }
  }

  **重要提醒**：
  - 优先返回准确的元素文本（text），必须逐字摘自截图
  - 若返回 mark_id，它只是辅助字段，文本才是最终定位依据
  - 不要混淆列表序号与真实标题文本
  - 不要因为相邻位置接近就重复选择同一类错误元素；这次应优先排除栏目标题、分类名、时间、按钮文本

  请仔细核对后重新选择正确元素。

# 使用 LLM 视觉识别页码跳转控件
jump_widget_llm_system_prompt: |
  你是一个网页爬虫专家。你的任务是在截图中准确识别"页码跳转控件"（文本优先），包括：
  1. 页码输入框（用于输入要跳转的页码数字）
  2. 确定/跳转按钮（用于确认跳转）

  ## 识别要点

  1. **输入框的特征**：
     - 可能带有 placeholder 文本，如"请输入页码"、"页码"、"Page"等
     - 位置：通常在分页区域，位于页码数字列表的旁边
     - 形态：单行文本输入框，可能有边框

  2. **确定/跳转按钮的特征**：
     - 按钮文本通常是："确定"、"确认"、"跳转"、"GO"、"Go"等
     - 位置：通常在输入框旁边或后面
     - 形态：可点击的按钮元素

  3. **不要误选的元素**：
     - 页码数字本身
     - "下一页"、"上一页"按钮
     - 筛选条件输入框（非分页用途）
     - 搜索框
     - 已禁用的按钮

  4. **元素返回要求**：
     - input/button 都必须给出 text，且 text 必须来自截图可见文本或占位提示
     - mark_id 可选：若能确认可返回；不能确认可省略

  5. **多个候选的处理**：
     - 如果页面有多个输入框或按钮，优先选择：
       1) 位于分页区域的元素
       2) 有明确"页码"相关 placeholder 的输入框
       3) 文本为"确定"、"跳转"等的按钮
  6. 如果用户消息里提供了已选中的站点 skills，它们只提供先验线索；一切以当前截图和当前 DOM 为准
  7. 如果无法确认控件属于分页区域，返回 found=false；不要把搜索框、筛选输入框、站内检索框误判为跳页输入框

  ## 返回格式（不含 protocol 字段）

  严格 JSON 格式，不要使用 markdown 代码块：

  - 找到跳转控件时 Args: {"purpose":"jump_widget","found":true,"input":{"text":"输入框提示","mark_id":int(可选)},"button":{"text":"按钮文本","mark_id":int(可选)}}
  - 只找到输入框时 Args: {"purpose":"jump_widget","found":true,"input":{"text":"输入框提示","mark_id":int(可选)},"button":null}
  - 未找到跳转控件时 Args: {"purpose":"jump_widget","found":false,"input":null,"button":null}

jump_widget_llm_user_message: |
  请仔细观察截图，找到页码跳转控件，并返回输入框与按钮的文本（text）。

  ## 已选中的站点 skills
  {{selected_skills_context}}

  需要识别两个元素：
  1. 页码输入框：用于输入要跳转的页码数字
  2. 确定/跳转按钮：用于确认跳转

  注意：
  - 关注页面底部的分页区域
  - 寻找带有"页码"相关提示文字的输入框
  - 寻找"确定"、"确认"、"跳转"、"GO"等按钮
  - 如果两个元素都有，请分别返回 input 和 button
  - 如能确认元素编号可额外返回 mark_id；无法确认时可省略

